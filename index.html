<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Luxing Conlecting — a coffee experience website concept. Scroll-driven, cinematic, and warm before you even visit."
    />
    <title>Luxing Conlecting — Coffee, Reimagined</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,500;1,700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Italiana&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Above-the-fold image preload. The hero shot is also sourced
         as WebP from <picture> in Hero.jsx; this hint just removes a
         DNS/connection step on the first request. Vite's BASE_URL is
         known at build time, so we hard-code "/" here and let
         <picture> handle the GitHub-Pages subpath variant on its
         own. If the asset is renamed, update both this hint and
         Hero.jsx. -->
    <link rel="preload" as="image" href="/heroSplashLarge.webp" type="image/webp" fetchpriority="high" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
